<p>Consultar City</p>
<input type="number" [(ngModel)]="idSearch">
<button (click)="seachCity(idSearch)" class="btn btn-success">Consultar por id</button>
<button (click)="getCities()" class="btn btn-primary">Consultar todas</button>
<table class="table table-hover table-bordered shadow-sm">
    <thead class="table-dark">
      <tr>
        <th scope="col" style="width: 15%;">ID</th>
        <th scope="col">Nombre de la Ciudad</th>
      </tr>
    </thead>
    <tbody>
      @for (city of cities; track city.id) {
        <tr>
          <td>{{ city.id }}</td>
          <td>{{ city.nameCity }}</td>
        </tr>
      } @empty {
        <tr>
          <td colspan="2" class="text-center">Cargando ciudades ...</td>
        </tr>
      }
    </tbody>
</table>
<button class="btn btn-secondary" (click)="nextPage()">Siguiente Página</button>
<button class="btn btn-secondary" (click)="lastPage()">Página Anterior</button>

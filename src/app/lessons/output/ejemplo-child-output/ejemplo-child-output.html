<div class="cont">
    <P>Componente hijo Ejemplo &#64;Output</P>
    <!-- <p>Login</p> -->
    <p>Ingresa el nombre de usuario que quieres buscar</p>
    <input type="text" [(ngModel)]='userName'>
    <button (click)="setSearchUser()">Buscar</button>

    @if (userSearch) {
    <p>
        Usuario encontrado: {{userSearch}}
    </p>
    }
    <div class="card flex justify-center">
        <!-- <p-selectbutton [options]='levels' [(ngModel)]='selectLevel'></p-selectbutton> -->
        <p-select [options]="roles" [(ngModel)] = 'selectRole'></p-select>
        
    </div>
    <p> El rol seleccionado es: {{selectRole}}</p>
    <button (click)="notify()">Ingresar</button>
</div>
